services:
  db:
    image: postgres:16-alpine
    container_name: kkbus_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-kkbus_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kkbus_pass}
      POSTGRES_DB: ${DB_NAME:-kkbus_db}
    ports:
      - "5432:5432"
    volumes:
      - kkbus_db_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d


  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: kkbus_backend
    restart: always
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-kkbus_user}
      - DB_PASSWORD=${DB_PASSWORD:-kkbus_pass}
      - DB_NAME=${DB_NAME:-kkbus_db}
      - JWT_SECRET=${JWT_SECRET:-zmien-mnie-na-bezpieczny-klucz}
    ports:
      - "3000:3000"
    depends_on:
      - db

  frontend:
    build:
      context: ../frontend-next
      dockerfile: Dockerfile
    container_name: kkbus_frontend
    restart: always
    ports:
      - "80:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend

  frontend-driver:
    build:
      context: ../frontend-driver
      dockerfile: Dockerfile
    container_name: kkbus_frontend_driver
    restart: always
    ports:
      - "4040:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend

volumes:
  kkbus_db_data:
    driver: local
